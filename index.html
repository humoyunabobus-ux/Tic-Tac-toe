<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi-Tech Neon Tic-Tac-Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05050a;
            --grid-neon: #0ff;
            --x-neon: #0ff;
            --o-neon: #f0f;
            --danger-neon: #ff003c;
            --warning-neon: #ffaa00;
            --text-glow: 0 0 5px rgba(0, 255, 255, 0.5), 0 0 10px rgba(0, 255, 255, 0.5);
            --danger-glow: 0 0 10px rgba(255, 0, 60, 0.8);
            --warning-glow: 0 0 10px rgba(255, 170, 0, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 2rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: var(--text-glow), 0 0 20px var(--grid-neon);
        }

        .hud {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
            justify-content: center;
            background: rgba(0, 255, 255, 0.05);
            padding: 15px 30px;
            border: 1px solid var(--grid-neon);
            border-radius: 10px;
            box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.1), 0 0 15px rgba(0, 255, 255, 0.2);
            width: 100%;
            max-width: 650px;
            z-index: 5;
        }

        .hud-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            font-size: 1.2rem;
            color: var(--grid-neon);
            text-shadow: 0 0 5px var(--grid-neon);
        }

        select {
            background: transparent;
            color: #fff;
            border: 1px solid var(--grid-neon);
            padding: 10px;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            text-shadow: 0 0 5px var(--grid-neon);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            transition: 0.3s;
        }

        select option {
            background: var(--bg-color);
            color: var(--grid-neon);
        }

        select:hover {
            box-shadow: 0 0 20px var(--grid-neon);
        }

        select#difficulty option[value="doomsday"] {
            color: var(--danger-neon);
        }

        /* Timer UI */
        .timer-wrapper {
            width: 100%;
            max-width: 650px;
            height: 10px;
            background: rgba(255, 0, 60, 0.1);
            border: 1px solid var(--danger-neon);
            border-radius: 5px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(255, 0, 60, 0.2);
            overflow: hidden;
            display: none;
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background: var(--danger-neon);
            box-shadow: 0 0 15px var(--danger-neon);
            transform-origin: left;
        }

        .board {
            display: grid;
            gap: 0;
            border: 2px solid var(--grid-neon);
            box-shadow: 0 0 20px var(--grid-neon), inset 0 0 20px var(--grid-neon);
            border-radius: 5px;
            background: var(--bg-color);
            position: relative;
        }

        .loading {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 5, 10, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--o-neon);
            text-shadow: 0 0 10px var(--o-neon);
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .loading.active {
            opacity: 1;
            pointer-events: all;
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            cursor: pointer;
            border: 1px solid rgba(0, 255, 255, 0.3);
            transition: all 0.2s ease;
            position: relative;
        }

        .cell:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: inset 0 0 15px var(--grid-neon);
        }

        .cell.x {
            color: var(--x-neon);
            text-shadow: 0 0 10px var(--x-neon), 0 0 20px var(--x-neon), 0 0 40px var(--x-neon);
        }

        .cell.o {
            color: var(--o-neon);
            text-shadow: 0 0 10px var(--o-neon), 0 0 20px var(--o-neon), 0 0 40px var(--o-neon);
        }

        /* Overlays */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(5, 5, 10, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .overlay h2 {
            font-size: 5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-align: center;
        }

        .overlay p {
            font-size: 1.5rem;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-align: center;
        }

        .win-x { color: var(--x-neon); text-shadow: 0 0 20px var(--x-neon), 0 0 50px var(--x-neon); }
        .win-o { color: var(--o-neon); text-shadow: 0 0 20px var(--o-neon), 0 0 50px var(--o-neon); }
        .win-danger { color: var(--danger-neon); text-shadow: 0 0 20px var(--danger-neon), 0 0 50px var(--danger-neon); }
        .draw { color: #fff; text-shadow: 0 0 20px #fff, 0 0 50px #fff; }

        /* Warnings & Buttons */
        #warningScreen h2 {
            color: var(--warning-neon);
            text-shadow: var(--warning-glow);
            font-size: 4rem;
        }

        .btn-outline {
            background: transparent;
            color: var(--warning-neon);
            border: 2px solid var(--warning-neon);
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.3), inset 0 0 10px rgba(255, 170, 0, 0.2);
            transition: all 0.3s;
        }

        .btn-outline:hover {
            background: rgba(255, 170, 0, 0.2);
            box-shadow: 0 0 30px var(--warning-neon), inset 0 0 20px var(--warning-neon);
            text-shadow: 0 0 10px var(--warning-neon);
        }

        .btn-massive {
            background: rgba(0, 255, 255, 0.1);
            color: var(--grid-neon);
            border: 4px solid var(--grid-neon);
            padding: 40px 100px;
            font-size: 6rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3), inset 0 0 20px rgba(0, 255, 255, 0.2);
            text-shadow: 0 0 20px var(--grid-neon);
            transition: all 0.2s;
            animation: pulse-btn 1s infinite alternate;
        }

        .btn-massive:hover {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 80px var(--grid-neon), inset 0 0 50px var(--grid-neon);
            transform: scale(1.05);
            animation: none;
        }

        @keyframes pulse-btn {
            from { box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), inset 0 0 10px rgba(0, 255, 255, 0.2); }
            to { box-shadow: 0 0 60px rgba(0, 255, 255, 0.6), inset 0 0 30px rgba(0, 255, 255, 0.4); }
        }
    </style>
</head>
<body>

    <h1>TIC TAC TOE</h1>
    
    <div class="hud">
        <div class="hud-group">
            <label for="boardSize">GRID:</label>
            <select id="boardSize" onchange="initGame()">
                <option value="3" selected>3x3 (Classic)</option>
                <option value="4">4x4 (Advanced)</option>
                <option value="5">5x5 (Expert)</option>
                <option value="6">6x6 (Ultimate)</option>
            </select>
        </div>
        <div class="hud-group">
            <label for="difficulty" onchange="initGame()">LEVELS:</label>
            <select id="difficulty" onchange="initGame()">
                <option value="easy" selected>V1.0 - GLITCH</option>
                <option value="medium">V2.0 - FIREWALL</option>
                <option value="hard">V3.0 - NEXUS (1.8s limit)</option>
                <option value="doomsday">V4.0 - DOOMSDAY (1.2s limit)</option>
            </select>
        </div>
    </div>

    <div class="timer-wrapper" id="timerWrapper">
        <div class="timer-bar" id="timerBar"></div>
    </div>

    <div class="board" id="board">
        <div class="loading" id="loading">CALCULATING...</div>
    </div>

    <!-- Step 1: Warning Overlay -->
    <div id="warningScreen" class="overlay">
        <h2>CRITICAL LOW TIME WARNING</h2>
        <p>YOU WILL HAVE LIMITED TIME TO MAKE A MOVE.<br>HESITATION MEANS DEFEAT.</p>
        <button class="btn-outline" onclick="acknowledgeWarning()">OK, UNDERSTOOD</button>
    </div>

    <!-- Step 2: Giant Start Button Overlay -->
    <div id="startScreen" class="overlay">
        <button class="btn-massive" onclick="startGameSequence()">START</button>
    </div>

    <!-- Post-game Overlay -->
    <div id="overlay" class="overlay">
        <h2 id="winnerText">WINNER</h2>
        <p style="animation: none;">REBOOTING IN 3 SECONDS...</p>
    </div>

    <script>
        const difficultySelect = document.getElementById('difficulty');
        const boardSizeSelect = document.getElementById('boardSize');
        
        const overlay = document.getElementById('overlay');
        const warningScreen = document.getElementById('warningScreen');
        const startScreen = document.getElementById('startScreen');
        const winnerText = document.getElementById('winnerText');
        
        const boardElem = document.getElementById('board');
        const loadingIndicator = document.getElementById('loading');
        
        const timerWrapper = document.getElementById('timerWrapper');
        const timerBar = document.getElementById('timerBar');
        
        const PLAYER = 'X';
        const AI = 'O';
        
        let size = 3;
        let board = [];
        let isGameActive = false; 
        let isPlayerTurn = true;
        let winPatterns = [];
        
        let turnTimer;
        let timeLimit = 0;

        function initGame() {
            stopTimer();
            size = parseInt(boardSizeSelect.value);
            board = new Array(size * size).fill('');
            isPlayerTurn = true;
            generateWinPatterns();
            renderBoard();

            const difficulty = difficultySelect.value;
            
            // Handle Overlays & Start Logic based on difficulty
            if (difficulty === 'hard' || difficulty === 'doomsday') {
                isGameActive = false;
                timerWrapper.style.display = 'block';
                warningScreen.classList.add('active');
                startScreen.classList.remove('active');
            } else {
                isGameActive = true;
                timerWrapper.style.display = 'none';
                warningScreen.classList.remove('active');
                startScreen.classList.remove('active');
            }
        }

        function acknowledgeWarning() {
            warningScreen.classList.remove('active');
            startScreen.classList.add('active');
        }

        function startGameSequence() {
            startScreen.classList.remove('active');
            isGameActive = true;
            startTimer();
        }

        function generateWinPatterns() {
            winPatterns = [];
            for (let i = 0; i < size; i++) {
                let row = [];
                for (let j = 0; j < size; j++) row.push(i * size + j);
                winPatterns.push(row);
            }
            for (let i = 0; i < size; i++) {
                let col = [];
                for (let j = 0; j < size; j++) col.push(j * size + i);
                winPatterns.push(col);
            }
            let diag1 = [], diag2 = [];
            for (let i = 0; i < size; i++) {
                diag1.push(i * size + i);
                diag2.push(i * size + (size - 1 - i));
            }
            winPatterns.push(diag1);
            winPatterns.push(diag2);
        }

        function renderBoard() {
            const existingCells = boardElem.querySelectorAll('.cell');
            existingCells.forEach(c => c.remove());

            boardElem.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            boardElem.style.gridTemplateRows = `repeat(${size}, 1fr)`;

            let cellSize = size === 3 ? 120 : (size === 4 ? 95 : (size === 5 ? 75 : 65));
            let fontSize = size === 3 ? 5 : (size === 4 ? 4 : (size === 5 ? 3 : 2.5));

            for (let i = 0; i < size * size; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.style.width = `${cellSize}px`;
                cell.style.height = `${cellSize}px`;
                cell.style.fontSize = `${fontSize}rem`;
                cell.setAttribute('data-index', i);
                cell.addEventListener('click', () => handleCellClick(cell));
                boardElem.appendChild(cell);
            }
        }

        function startTimer() {
            if (!isGameActive || !isPlayerTurn) return;

            const difficulty = difficultySelect.value;
            if (difficulty === 'hard') timeLimit = 1800;
            else if (difficulty === 'doomsday') timeLimit = 1200;
            else timeLimit = 0;

            if (timeLimit > 0) {
                timerBar.style.transition = 'none';
                timerBar.style.transform = 'scaleX(1)';
                
                void timerBar.offsetWidth; // Force reflow

                timerBar.style.transition = `transform ${timeLimit}ms linear`;
                timerBar.style.transform = 'scaleX(0)';

                turnTimer = setTimeout(() => {
                    if (isPlayerTurn && isGameActive) {
                        triggerEndGame("TIME OUT", 'win-danger');
                    }
                }, timeLimit);
            }
        }

        function stopTimer() {
            clearTimeout(turnTimer);
            timerBar.style.transition = 'none';
            timerBar.style.transform = 'scaleX(1)';
        }

        function handleCellClick(cell) {
            const index = cell.getAttribute('data-index');

            if (board[index] !== '' || !isGameActive || !isPlayerTurn) return;

            stopTimer(); 
            makeMove(index, PLAYER);

            if (checkWin(board, PLAYER)) {
                triggerEndGame("PLAYER WINS", 'win-x');
            } else if (checkDraw(board)) {
                triggerEndGame("DRAW", 'draw');
            } else {
                isPlayerTurn = false;
                
                if (difficultySelect.value === 'doomsday' && size > 3) {
                    loadingIndicator.classList.add('active');
                    setTimeout(() => {
                        makeBotMove();
                        loadingIndicator.classList.remove('active');
                    }, 50);
                } else {
                    setTimeout(makeBotMove, 150);
                }
            }
        }

        function makeMove(index, player) {
            board[index] = player;
            const cells = document.querySelectorAll('.cell');
            cells[index].innerText = player;
            cells[index].classList.add(player.toLowerCase());
        }

        function makeBotMove() {
            if (!isGameActive) return;

            const difficulty = difficultySelect.value;
            let bestMoveIndex;

            if (difficulty === 'easy') {
                bestMoveIndex = getRandomMove(board);
            } else if (difficulty === 'medium') {
                bestMoveIndex = getMediumMove(board);
            } else if (difficulty === 'hard') {
                bestMoveIndex = getSmartMove(board, size === 3 ? 9 : 3); 
            } else {
                bestMoveIndex = getSmartMove(board, size === 3 ? 9 : (size === 4 ? 5 : 4)); 
            }

            makeMove(bestMoveIndex, AI);

            if (checkWin(board, AI)) {
                triggerEndGame("SYSTEM WINS", 'win-o');
            } else if (checkDraw(board)) {
                triggerEndGame("DRAW", 'draw');
            } else {
                isPlayerTurn = true;
                startTimer(); 
            }
        }

        // --- BOT PROTOCOLS ---

        function getEmptyCells(currentBoard) {
            return currentBoard.map((val, idx) => val === '' ? idx : null).filter(val => val !== null);
        }

        function getRandomMove(currentBoard) {
            const emptyCells = getEmptyCells(currentBoard);
            return emptyCells[Math.floor(Math.random() * emptyCells.length)];
        }

        function getMediumMove(currentBoard) {
            let move = findWinningMove(currentBoard, AI);
            if (move !== -1) return move;
            
            move = findWinningMove(currentBoard, PLAYER);
            if (move !== -1) return move;
            
            return getRandomMove(currentBoard);
        }

        function findWinningMove(currentBoard, player) {
            const emptyCells = getEmptyCells(currentBoard);
            for (let i of emptyCells) {
                currentBoard[i] = player;
                if (checkWin(currentBoard, player)) {
                    currentBoard[i] = '';
                    return i;
                }
                currentBoard[i] = '';
            }
            return -1;
        }

        function evaluateBoard(currentBoard) {
            let score = 0;
            for (let pattern of winPatterns) {
                let aiCount = 0;
                let playerCount = 0;
                for (let index of pattern) {
                    if (currentBoard[index] === AI) aiCount++;
                    else if (currentBoard[index] === PLAYER) playerCount++;
                }
                
                if (aiCount > 0 && playerCount === 0) {
                    score += Math.pow(10, aiCount);
                } else if (playerCount > 0 && aiCount === 0) {
                    score -= Math.pow(15, playerCount); 
                }
            }
            let center = Math.floor((size * size) / 2);
            if (currentBoard[center] === AI) score += 50;
            else if (currentBoard[center] === PLAYER) score -= 50;
            return score;
        }

        function getSmartMove(currentBoard, maxDepth) {
            let winMove = findWinningMove(currentBoard, AI);
            if (winMove !== -1) return winMove;

            let blockMove = findWinningMove(currentBoard, PLAYER);
            if (blockMove !== -1) return blockMove;

            let bestScore = -Infinity;
            let move = -1;
            const emptyCells = getEmptyCells(currentBoard);
            
            if (emptyCells.length === size * size) {
                let center = Math.floor((size * size) / 2);
                return currentBoard[center] === '' ? center : 0;
            }

            for (let i of emptyCells) {
                currentBoard[i] = AI;
                let score = minimax(currentBoard, 0, false, -Infinity, Infinity, maxDepth);
                currentBoard[i] = '';
                if (score > bestScore) {
                    bestScore = score;
                    move = i;
                }
            }
            return move !== -1 ? move : getRandomMove(currentBoard);
        }

        function minimax(currentBoard, depth, isMaximizing, alpha, beta, maxDepth) {
            if (checkWin(currentBoard, AI)) return 1000000 - depth;
            if (checkWin(currentBoard, PLAYER)) return depth - 1000000;
            if (getEmptyCells(currentBoard).length === 0) return 0;
            
            if (depth >= maxDepth) return evaluateBoard(currentBoard);

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i of getEmptyCells(currentBoard)) {
                    currentBoard[i] = AI;
                    let score = minimax(currentBoard, depth + 1, false, alpha, beta, maxDepth);
                    currentBoard[i] = '';
                    bestScore = Math.max(score, bestScore);
                    alpha = Math.max(alpha, bestScore);
                    if (beta <= alpha) break; 
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i of getEmptyCells(currentBoard)) {
                    currentBoard[i] = PLAYER;
                    let score = minimax(currentBoard, depth + 1, true, alpha, beta, maxDepth);
                    currentBoard[i] = '';
                    bestScore = Math.min(score, bestScore);
                    beta = Math.min(beta, bestScore);
                    if (beta <= alpha) break; 
                }
                return bestScore;
            }
        }

        function checkWin(currentBoard, player) {
            return winPatterns.some(pattern => {
                return pattern.every(index => currentBoard[index] === player);
            });
        }

        function checkDraw(currentBoard) {
            return !currentBoard.includes('');
        }

        function triggerEndGame(text, colorClass) {
            stopTimer();
            isGameActive = false;
            winnerText.innerText = text;
            
            winnerText.className = '';
            winnerText.classList.add(colorClass);
            
            overlay.classList.add('active');

            setTimeout(() => {
                overlay.classList.remove('active');
                setTimeout(initGame, 500); 
            }, 3000);
        }

        // Start on load
        window.onload = initGame;
    </script>
</body>
</html>
